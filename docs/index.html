<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify-themeable/dist/css/theme-simple-dark.css">
<style>
  :root {
    --sidebar-width: 380px;
  }
  .markdown-section {
    max-width: 900px;
    margin: 0 !important; /* << remove automatic centering */
  }
</style>
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: '[ Z-Image Power Nodes ]',
      repo: 'https://github.com/martin-rizzo/ComfyUI-ZImagePowerNodes',
      auto2top      : true,
      subMaxLevel   : 0,
      loadSidebar   : true,
      loadNavbar    : true,
      requestHeaders: {
          'cache-control': 'no-cache'
      }
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
</body>
</html>
